<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SingleIDに関わる要素の全体図</title>
  <desc id="desc">Microsoftクラウド、SingleIDクラウド、クライアント端末、オンプレ機器の関係を示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0f6fb8"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#003b73" flood-opacity=".12"/>
    </filter>
    <symbol id="cloud-icon" viewBox="0 0 24 24">
      <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
    </symbol>
    <symbol id="client-icon" viewBox="0 0 24 24">
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </symbol>
    <symbol id="device-icon" viewBox="0 0 24 24">
      <rect width="20" height="14" x="2" y="3" rx="2"/>
      <line x1="8" x2="16" y1="21" y2="21"/>
      <line x1="12" x2="12" y1="17" y2="21"/>
    </symbol>
  </defs>
  <style>
    .canvas { fill: #fff; }
    .card { fill: #f8fbff; stroke: #9dc8ee; stroke-width: 2; filter: url(#soft-shadow); }
    .card--primary { fill: #eef7ff; stroke: #5aa7e8; }
    .icon-bg { fill: #0064ad; }
    .icon { fill: none; stroke: #fff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .title { fill: #003b73; font-family: "Yu Gothic", "Hiragino Sans", sans-serif; font-size: 25px; font-weight: 700; }
    .item { fill: #eef6fd; stroke: #a8ceef; stroke-width: 1.5; }
    .item-text { fill: #003b73; font-family: "Yu Gothic", "Hiragino Sans", sans-serif; font-size: 18px; font-weight: 700; }
    .line { fill: none; stroke: #0f6fb8; stroke-width: 5; marker-end: url(#arrow); }
    .line--dashed { stroke-dasharray: 14 12; }
    .label { fill: #fff; stroke: #9dc8ee; stroke-width: 2; }
    .label-text { fill: #003b73; font-family: "Yu Gothic", "Hiragino Sans", sans-serif; font-size: 25px; font-weight: 800; }
  </style>
  <rect class="canvas" width="1600" height="900"/>

  <g transform="translate(90 90)">
    <rect class="card" width="430" height="210" rx="26"/>
    <circle class="icon-bg" cx="54" cy="54" r="25"/>
    <use href="#cloud-icon" class="icon" x="42" y="42" width="24" height="24"/>
    <text class="title" x="92" y="64">Microsoftクラウド</text>
    <rect class="item" x="34" y="100" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="126">Microsoft Entra ID</text>
    <rect class="item" x="34" y="148" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="174">Microsoft Intune</text>
  </g>

  <g transform="translate(1080 80)">
    <rect class="card card--primary" width="430" height="305" rx="26"/>
    <circle class="icon-bg" cx="54" cy="54" r="25"/>
    <use href="#cloud-icon" class="icon" x="42" y="42" width="24" height="24"/>
    <text class="title" x="92" y="64">SingleIDクラウド</text>
    <rect class="item" x="34" y="105" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="131">RADIUS</text>
    <rect class="item" x="34" y="153" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="179">LDAP</text>
    <rect class="item" x="34" y="201" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="227">PKI</text>
    <rect class="item" x="34" y="249" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="275">IdP</text>
  </g>

  <g transform="translate(90 610)">
    <rect class="card" width="430" height="210" rx="26"/>
    <circle class="icon-bg" cx="54" cy="54" r="25"/>
    <use href="#client-icon" class="icon" x="42" y="42" width="24" height="24"/>
    <text class="title" x="92" y="64">クライアント端末</text>
    <rect class="item" x="34" y="100" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="126">無線クライアント</text>
    <rect class="item" x="34" y="148" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="174">VPNクライアント</text>
  </g>

  <g transform="translate(1080 610)">
    <rect class="card" width="430" height="210" rx="26"/>
    <circle class="icon-bg" cx="54" cy="54" r="25"/>
    <use href="#device-icon" class="icon" x="42" y="42" width="24" height="24"/>
    <text class="title" x="92" y="64">オンプレ機器</text>
    <rect class="item" x="34" y="100" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="126">AP</text>
    <rect class="item" x="34" y="148" width="362" height="38" rx="12"/>
    <text class="item-text" x="55" y="174">VPNゲートウェイ</text>
  </g>

  <path class="line" d="M520 195H1075"/>
  <rect class="label" x="715" y="165" width="160" height="58" rx="24"/>
  <text class="label-text" x="766" y="202">SCIM</text>

  <path class="line" d="M305 300V605"/>
  <rect class="label" x="230" y="432" width="150" height="58" rx="24"/>
  <text class="label-text" x="251" y="469">構成配布</text>

  <path class="line line--dashed" d="M1100 365C910 475 760 555 520 635"/>
  <rect class="label" x="750" y="455" width="130" height="58" rx="24"/>
  <text class="label-text" x="775" y="492">SCEP</text>

  <path class="line" d="M520 715H1075"/>
  <rect class="label" x="720" y="686" width="150" height="58" rx="24"/>
  <text class="label-text" x="747" y="723">接続要求</text>

  <path class="line" d="M1295 610V390"/>
  <path class="line" d="M1295 390V610"/>
  <rect class="label" x="1200" y="455" width="190" height="58" rx="24"/>
  <text class="label-text" x="1223" y="492">RADIUS認証</text>
</svg>
