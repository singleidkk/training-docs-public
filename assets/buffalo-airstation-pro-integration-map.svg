<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2120 430" role="img" aria-labelledby="title desc">
  <title id="title">Buffalo AirStation Pro無線LAN連携の構成図</title>
  <desc id="desc">無線クライアント、Buffalo AirStation Pro、SingleIDクラウドの関係を示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0f6fb8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#003b73" flood-opacity=".10"/>
    </filter>
    <symbol id="vpn-client" viewBox="0 0 24 24"><rect width="18" height="12" x="3" y="4" rx="2"/><path d="M9 20h6M12 16v4"/><path d="M8 10h8"/><path d="M12 7v6"/></symbol>
    <symbol id="wifi-client" viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><path d="M12 20h.01"/></symbol>
    <symbol id="firewall" viewBox="0 0 24 24"><path d="M4 3h16v7c0 5-3.4 9.4-8 11-4.6-1.6-8-6-8-11Z"/><path d="M8 8h8M8 12h8M10 16h4"/></symbol>
    <symbol id="router" viewBox="0 0 24 24"><rect width="18" height="10" x="3" y="10" rx="2"/><path d="M7 10V7M12 10V5M17 10V7"/><path d="M7 15h.01M12 15h.01M17 15h.01"/></symbol>
    <symbol id="ap" viewBox="0 0 24 24"><rect width="18" height="10" x="3" y="11" rx="2"/><path d="M7 8a7 7 0 0 1 10 0"/><path d="M10 5a11 11 0 0 1 4 0"/><path d="M8 16h.01M12 16h.01M16 16h.01"/></symbol>
    <symbol id="cloud" viewBox="0 0 24 24"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></symbol>
  </defs>
  <style>
    .card { fill: #f8fbff; stroke: #9dc8ee; stroke-width: 2.5; filter: url(#shadow); }
    .card-strong { fill: #eef7ff; stroke: #4f9fe3; }
    .title { fill: #003b73; font-family: "Yu Gothic", "Hiragino Sans", sans-serif; font-size: 34px; font-weight: 800; }
    .item { fill: #ffffff; stroke: #b8d6ef; stroke-width: 2; }
    .item-text { fill: #003b73; font-family: "Yu Gothic", "Hiragino Sans", sans-serif; font-size: 22px; font-weight: 700; }
    .line { fill: none; stroke: #0f6fb8; stroke-width: 7; marker-end: url(#arrow); }
    .label { fill: #ffffff; stroke: #9dc8ee; stroke-width: 2.5; }
    .label-text { fill: #003b73; font-family: "Yu Gothic", "Hiragino Sans", sans-serif; font-size: 28px; font-weight: 800; text-anchor: middle; dominant-baseline: middle; }
    .icon-bg { fill: #0064ad; }
    .icon { fill: none; stroke: #ffffff; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <rect width="2120" height="430" fill="#ffffff"/>

  <g transform="translate(20 24)">
    <rect class="card" width="430" height="370" rx="32"/>
    <circle class="icon-bg" cx="66" cy="72" r="32"/>
    <use href="#wifi-client" class="icon" x="50" y="56" width="32" height="32"/>
    <text class="title" x="112" y="85">無線クライアント</text>
    <rect class="item" x="38" y="126" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="157">SSID接続</text>
    <rect class="item" x="38" y="188" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="219">WPA2 / WPA3 Enterprise</text>
    <rect class="item" x="38" y="250" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="281">EAP-TLS</text>
    <rect class="item" x="38" y="312" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="343">クライアント証明書</text>
  </g>

  <g transform="translate(830 24)">
    <rect class="card" width="430" height="370" rx="32"/>
    <circle class="icon-bg" cx="66" cy="72" r="32"/>
    <use href="#ap" class="icon" x="50" y="56" width="32" height="32"/>
    <text class="title" x="112" y="85">AirStation Pro</text>
    <rect class="item" x="38" y="126" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="157">SSID</text>
    <rect class="item" x="38" y="188" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="219">WPA2 / WPA3 Enterprise</text>
    <rect class="item" x="38" y="250" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="281">RADIUSクライアント</text>
    <rect class="item" x="38" y="312" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="343">属性形式</text>
  </g>

  <g transform="translate(1638 24)">
    <rect class="card card-strong" width="430" height="370" rx="32"/>
    <circle class="icon-bg" cx="66" cy="72" r="32"/>
    <use href="#cloud" class="icon" x="50" y="56" width="32" height="32"/>
    <text class="title" x="112" y="85">SingleIDクラウド</text>
    <rect class="item" x="38" y="126" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="157">ユーザ / グループ</text>
    <rect class="item" x="38" y="188" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="219">クライアント証明書</text>
    <rect class="item" x="38" y="250" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="281">拡張RADIUS</text>
    <rect class="item" x="38" y="312" width="354" height="46" rx="15"/>
    <text class="item-text" x="62" y="343">RADIUSサイト / 認証ログ</text>
  </g>

  <path class="line" d="M472 209H808"/>
  <rect class="label" x="545" y="174" width="190" height="66" rx="28"/>
  <text class="label-text" x="640" y="207">802.1X</text>

  <path class="line" d="M1282 209H1616"/>
  <rect class="label" x="1336" y="174" width="225" height="66" rx="28"/>
  <text class="label-text" x="1449" y="207">RADIUS認証</text>
</svg>
